<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Library Management System</title>
    <!-- Dynamic SVG Favicon (Library Books) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link rel="manifest" href="manifest.json">
    <!-- Reusing our premium glassmorphism CSS -->
    <link rel="stylesheet" href="lms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Specific overrides just for the login page */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .login-box {
            background-color: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .login-header {
            margin-bottom: 2rem;
        }

        .login-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 1.5rem;
                border-radius: 0;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                border: none;
            }
            .app-container {
                padding: 0;
            }
        }

        .role-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .role-btn {
            flex: 1;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .role-btn.active {
            background: rgba(0, 229, 255, 0.15);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }
    </style>
</head>

<body>

    <div class="app-layout login-container">

        <div class="login-box">
            <div class="login-header">
                <div class="login-icon">&#x1F4DA;</div>
                <h2>Welcome Back</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Library Management System</p>
            </div>

            <div class="role-selector">
                <button class="role-btn active" id="btn-student" onclick="selectRole('student')">Student</button>
                <button class="role-btn" id="btn-admin" onclick="selectRole('admin')">Admin</button>
            </div>

            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label id="label-username">Email Address</label>
                    <input type="text" id="login-username" required placeholder="name@university.edu"
                        autocomplete="username">
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••"
                        autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary w-100"
                    style="margin-top: 1rem; padding: 0.8rem; font-size: 1rem;">
                    Sign In
                </button>
            </form>

            <form id="register-form" style="display: none;">
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group" style="text-align: left; flex: 1;">
                        <label>First Name</label>
                        <input type="text" id="reg-fname" required placeholder="John">
                    </div>
                    <div class="form-group" style="text-align: left; flex: 1;">
                        <label>Last Name</label>
                        <input type="text" id="reg-lname" required placeholder="Doe">
                    </div>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>University ID</label>
                    <input type="text" id="reg-id" required placeholder="S2026001">
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required placeholder="john.doe@university.edu"
                        autocomplete="email">
                </div>
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group" style="text-align: left; flex: 1;">
                        <label>Department</label>
                        <select id="reg-department" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-light); border-radius: 6px; background: rgba(255, 255, 255, 0.05); color: white; font-family: inherit;">
                            <option value="" disabled selected>Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="Literature">Literature</option>
                            <option value="General">General / Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" id="reg-password" required placeholder="••••••••"
                        autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary w-100"
                    style="margin-top: 1rem; padding: 0.8rem; font-size: 1rem;">
                    Register Now
                </button>
            </form>

            <div style="margin-top: 1.5rem; font-size: 0.9rem;">
                <a href="#" id="toggle-form-link" onclick="toggleForm()" style="color: var(--primary); text-decoration: none; font-weight: 500;">Create an account</a>
            </div>

            <div style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);" id="demo-hints">
                <span id="hint-text">Demo Student: chaitanya@university.edu | pass: student123</span>
            </div>
        </div>

    </div>

    <!-- Global Toast Notification -->
    <div id="toast" class="toast">Message goes here</div>

    <script src="login.js"></script>
</body>

</html>
