<!DOCTYPE html>
<html>
<head>
<title>Types of CSS</title>
<style>
h2{
color:blue;
text-align:center;
}
p{
color:green;
font-size:18px;
}
</style>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Internal Style Example</h2>
<p>This paragraph uses internal CSS</p>
<h3 style="color:red; font-size:20px;">
This heading uses Inline CSS
</h3>
<h4>This heading uses External CSS</h4>
</body>
</html>
