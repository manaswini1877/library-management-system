<!DOCTYPE html>
<html>
<head>
<title>HTML5 Semantic Tags Example</title>
<style>
header, nav, section, article, aside, footer {
    border:1px solid black;
    margin:5px;
    padding:10px;
}
</style>
</head>

<body>

<header>
<h1>My Website</h1>
</header>

<nav>
<a href="#">Home</a> |
<a href="#">About</a> |
<a href="#">Contact</a>
</nav>

<main>

<section>
<h2>Technology Section</h2>

<article>
<h3>HTML5 Introduction</h3>
<p>HTML5 is used to structure web pages.</p>
</article>

</section>

<aside>
<p>This is a sidebar showing related information.</p>
</aside>

<figure>
<img src="image.jpg" width="200" height="150">
<figcaption>This is a sample image with caption.</figcaption>
</figure>

<div>
<p>This is a <span style="color:red;">highlighted</span> text using span inside div.</p>
</div>

</main>

<footer>
<p>Copyright 2026</p>
</footer>

</body>
</html>
